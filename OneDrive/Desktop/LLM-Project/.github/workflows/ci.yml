name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (basic compile check)
        run: |
          python -m compileall app integrations pipelines tests

      - name: Unit and regression tests
        run: |
          python -m unittest tests.test_api tests.test_regression_snapshots
